name: Build Binaries
permissions:
  contents: read
on:
  workflow_dispatch:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/build_binaries.yml'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'
      - '**.go'
jobs:
  build:
    name: Build
    if: github.repository_owner == 'miniflux'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Golang
        uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true
      - name: Compile binaries
        env:
          CGO_ENABLED: 0
        run: make build
      - name: Upload binaries
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: miniflux-*
          if-no-files-found: error
          retention-days: 5
